appId: com.sgtspeerock.sona
productName: Sona
copyright: Copyright © 2026 rinderhack
artifactName: '${productName}-v${version}-${os}-${arch}.${ext}'

directories:
  buildResources: build
  output: dist

files:
  - '!**/*'
  - 'out/**'
  - '!out/renderer/screenshots{,/**}'
  - 'package.json'

extraResources:
  - from: resources
    to: resources

win:
  icon: build/icon.ico
  executableName: Sona
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Sona
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  license: LICENSE.txt

mac:
  category: public.app-category.music
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  target:
    - AppImage
    - deb
    - tar.gz
  maintainer: sgtspeerock
  category: AudioVideo
  synopsis: 'A modern desktop music client for Navidrome and OpenSubsonic servers.'

npmRebuild: true
nativeRebuilder: legacy

publish:
  provider: github
  owner: sgtspeerock
  repo: sona
