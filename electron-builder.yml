appId: com.sgtspeerock.sona
productName: Sona
copyright: Copyright © 2026 rinderhack
icon: ./build/icon.ico
artifactName: '${productName}-v${version}-${os}-${arch}.${ext}'

directories:
  buildResources: build

files:
  - '!**/*'
  - 'out/**'
  - '!out/renderer/screenshots{,/**}'
  - 'package.json'

extraResources:
  - from: resources
    to: resources
  # Include ICU data files to fix "Invalid file descriptor to ICU data" error
  - from: node_modules/electron/dist
    to: .
    filter:
      - icudtl.dat
      - '**/*.pak'
      - '**/*.bin'

win:
  executableName: Sona
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  shortcutName: ${productName}
  oneClick: false
  allowToChangeInstallationDirectory: true
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  license: ./LICENSE.txt
  uninstallerIcon: ./build/icon.ico

mac:
  category: public.app-category.music
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  icon: ./build/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  target:
    - AppImage
    - deb
    - tar.gz
  maintainer: sgtspeerock
  category: AudioVideo
  synopsis: 'A modern desktop music client for Navidrome and OpenSubsonic servers.'

npmRebuild: true
nativeRebuilder: legacy

publish:
  provider: github
  owner: sgtspeerock
  repo: sona
